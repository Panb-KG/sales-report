<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f5f6fa;
  --bg2:#ffffff;
  --border:#e2e6ef;
  --dengbao:#d97706;--dengbao2:#fbbf24;
  --anquan:#059669;--anquan2:#34d399;
  --danpin:#2563eb;--danpin2:#60a5fa;
  --merged:#7c3aed;--merged2:#a78bfa;
  --text:#1e293b;--dim:#64748b;--light:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --radius:8px;
}

html,body{width:100%;height:100%;overflow:hidden;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  color:var(--text);background:var(--bg);}

/* === 顶栏 === */
.topbar{
  height:60px;display:flex;align-items:center;gap:20px;padding:0 24px;
  background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.logo{font-size:20px;font-weight:700;color:var(--text);white-space:nowrap;letter-spacing:.5px;}
.logo-accent{color:#d97706;margin-left:6px;font-size:13px;font-weight:500;}
.period{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;}

.stats-row{display:flex;gap:16px;flex:1;justify-content:center;}
.stat-card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 18px;text-align:center;min-width:100px;
}
.stat-label{font-size:10px;color:var(--dim);font-weight:500;letter-spacing:.5px;}
.stat-value{font-size:18px;font-weight:700;margin-top:1px;}

.toggles{display:flex;gap:8px;flex-shrink:0;}
.tgl{cursor:pointer;user-select:none;}
.tgl input{display:none;}
.tgl-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 14px;border-radius:20px;
  font-size:12px;font-weight:600;
  border:1.5px solid var(--border);
  color:var(--dim);background:#fff;
  transition:all .2s;white-space:nowrap;
}
.tgl-btn .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;transition:background .2s;}
.tgl input:checked~.tdb{border-color:var(--dengbao);color:var(--dengbao);background:#fffbeb;}
.tgl input:checked~.tdb .dot{background:var(--dengbao);}
.tgl input:checked~.taq{border-color:var(--anquan);color:var(--anquan);background:#ecfdf5;}
.tgl input:checked~.taq .dot{background:var(--anquan);}
.tgl input:checked~.tdp{border-color:var(--danpin);color:var(--danpin);background:#eff6ff;}
.tgl input:checked~.tdp .dot{background:var(--danpin);}

/* === 主体三栏 === */
.body{display:flex;height:calc(100vh - 60px);overflow:hidden;}
.panel{
  flex-shrink:0;display:flex;flex-direction:column;
  background:#fff;overflow:hidden;
  border-right:1px solid var(--border);
}
.panel-r{border-right:none;border-left:1px solid var(--border);}
.lpanel{width:280px;}
.rpanel{width:320px;}

.panel-header{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
}
.panel-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.panel-subtitle{font-size:10px;color:var(--light);margin-top:2px;}
.chart-wrap{flex:1;min-height:0;padding:8px 4px;}
.chart-wrap-pie{height:50%;min-height:180px;padding:8px;}

/* === 地图区 === */
.map-area{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg);
  border-right:1px solid var(--border);
  border-left:1px solid var(--border);
}
#mapEl{width:100%;height:100%;}

/* === 缩放工具条 === */
#zoomBar{
  position:absolute;right:14px;bottom:20px;z-index:150;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:#fff;border:1px solid var(--border);border-radius:24px;
  padding:8px 6px;box-shadow:var(--shadow-md);
  user-select:none;
}
.zoom-btn{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:var(--dim);line-height:1;
  transition:background .15s,color .15s;flex-shrink:0;
}
.zoom-btn:hover{background:var(--bg);color:var(--text);}
.zoom-btn:active{background:#e2e6ef;}
#zoomSlider{
  -webkit-appearance:none;appearance:none;
  writing-mode:vertical-lr;direction:rtl;
  width:4px;height:90px;
  border-radius:2px;
  background:linear-gradient(to bottom,#e2e6ef,#e2e6ef);
  outline:none;cursor:pointer;
  --fill-color:#94a3b8;
}
#zoomSlider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:#fff;border:2px solid #94a3b8;
  cursor:pointer;transition:border-color .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
#zoomSlider::-webkit-slider-thumb:hover{border-color:var(--text);}
.zoom-label{font-size:9px;color:var(--light);letter-spacing:.3px;}

/* === 弹层 === */
#overlay{
  position:absolute;background:#fff;
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;z-index:200;
  box-shadow:var(--shadow-md);
  min-width:200px;max-width:400px;
  transition:opacity .15s,transform .15s;
  transform:translateY(0);
}
#overlay.hidden{opacity:0;pointer-events:none;transform:translateY(6px);}
.ov-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;
  border-bottom:1px solid var(--border);padding-bottom:8px;}
.ov-list{margin-top:8px;font-size:11px;color:var(--dim);
  line-height:1.9;max-height:130px;overflow-y:auto;}
.ov-list div{display:flex;align-items:center;gap:6px;}
.ov-list span{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ov-list b{margin-left:auto;white-space:nowrap;}

/* === 响应式 === */
@media(max-width:1200px){
  .lpanel,.rpanel{width:240px;}
}
@media(max-width:960px){
  .lpanel{width:200px;}
  .rpanel{width:260px;}
  .stats-row{gap:8px;}
  .stat-card{padding:4px 10px;min-width:70px;}
  .stat-value{font-size:15px;}
}
</style>
</head>

// ====================================================
// 悬停弹层
// ====================================================
let _lastProv="";
function setupMapHover(){
  mapInst.off("mouseover");mapInst.off("mouseout");mapInst.off("mousemove");

  mapInst.on("mouseover",p=>{
    if(p.seriesName==="本周订单"&&p.name!==_lastProv){
      _lastProv=p.name;
      showOverlay(p.name,p.event?.event);
    }
  });
  mapInst.on("mousemove",p=>{
    if(p.seriesName==="本周订单"&&p.event?.event) moveOverlay(p.event.event);
  });
  mapInst.on("mouseout",p=>{
    if(p.seriesName==="本周订单"){_lastProv="";hideOverlay();}
  });
  mapInst.on("click",()=>{_lastProv="";hideOverlay();});
}

function getProvOrders(prov){
  return getActive().flatMap(k=>
    WEEK_ORDERS[k].filter(o=>o.province===prov).map(o=>({...o,type:k}))
  );
}

function showOverlay(prov,ev){
  const orders=getProvOrders(prov);
  if(!orders.length){hideOverlay();return;}

  const totalAmt=orders.reduce((s,o)=>s+o.amount,0);
  document.getElementById("ovTitle").innerHTML=
    `<span>${prov}</span><span style="float:right;font-size:12px;font-weight:500;color:var(--dim)">${orders.length}单 · ¥${fmt(totalAmt)}</span>`;

  drawBubbles(orders);

  const html=orders.map(o=>{
    const cl=CLR[o.type]?.main||getColor();
    const nm=o.customer.length>16?o.customer.substring(0,15)+"…":o.customer;
    return `<div><span style="background:${cl}"></span>${nm}<b style="color:${cl}">¥${fmt(o.amount)}</b></div>`;
  }).join("");
  document.getElementById("ovList").innerHTML=html;

  const ov=document.getElementById("overlay");
  ov.classList.remove("hidden");
  if(ev) positionOverlay(ev);
}

function drawBubbles(orders){
  const cv=document.getElementById("bubCanvas");
  const ctx=cv.getContext("2d");
  const W=320,H=260,cx=W/2,cy=H/2;
  cv.width=W;cv.height=H;
  ctx.clearRect(0,0,W,H);

  const n=orders.length;
  const maxA=Math.max(...orders.map(o=>o.amount));
  const R=Math.min(cx,cy)*.65;

  orders.forEach((o,i)=>{
    const angle=(2*Math.PI*i/n)-Math.PI/2;
    const bx=cx+R*Math.cos(angle);
    const by=cy+R*Math.sin(angle);
    const r=Math.max(10,Math.sqrt(o.amount/maxA)*34);
    const cl=CLR[o.type]?.main||getColor();

    // 连线
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(bx,by);
    ctx.strokeStyle="#e2e6ef";ctx.lineWidth=1;ctx.stroke();

    // 阴影
    ctx.beginPath();ctx.arc(bx+2,by+2,r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,0,0,.06)";ctx.fill();

    // 圆体
    const grad=ctx.createRadialGradient(bx-r*.2,by-r*.2,r*.05,bx,by,r);
    grad.addColorStop(0,cl+"ee");
    grad.addColorStop(1,cl+"88");
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle=cl;ctx.lineWidth=1.5;ctx.stroke();

    // 金额
    if(r>12){
      const label=o.amount>=10000?`${(o.amount/10000).toFixed(1)}万`:o.amount.toLocaleString();
      ctx.font=`bold ${Math.max(8,Math.floor(r/3.2))}px -apple-system,PingFang SC,sans-serif`;
      ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(label,bx,by);
    }
  });

  // 中心
  ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle="#f1f5f9";ctx.fill();
  ctx.strokeStyle="#e2e6ef";ctx.lineWidth=1.5;ctx.stroke();
  ctx.font="bold 11px -apple-system,sans-serif";ctx.fillStyle="#64748b";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(n+"单",cx,cy);
}

function positionOverlay(ev){
  const ov=document.getElementById("overlay");
  const rect=document.getElementById("mapEl").getBoundingClientRect();
  const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  const ow=ov.offsetWidth||320,oh=ov.offsetHeight||400;
  let ox=mx+18;if(ox+ow>rect.width-8)ox=mx-ow-12;
  let oy=my-20;if(oy+oh>rect.height-8)oy=rect.height-oh-8;if(oy<4)oy=4;
  ov.style.left=ox+"px";ov.style.top=oy+"px";
}
function moveOverlay(ev){
  const ov=document.getElementById("overlay");
  if(ov.classList.contains("hidden"))return;
  positionOverlay(ev);
}
function hideOverlay(){document.getElementById("overlay").classList.add("hidden");}

// ====================================================
// 饼图
// ====================================================
function buildPie(src){
  const t=getActive();
  if(!t.length)return[];
  if(t.length===1)return src[t[0]];
  const m={};
  t.forEach(k=>src[k].forEach(d=>{m[d.name]=(m[d.name]||0)+d.value;}));
  const tot=Object.values(m).reduce((a,b)=>a+b,0);
  return Object.entries(m).map(([n,v])=>({name:n,value:+(v/tot*100).toFixed(1)}))
    .sort((a,b)=>b.value-a.value);
}

function pieOpt(data){
  return{
    backgroundColor:"transparent",
    tooltip:{trigger:"item",backgroundColor:"#fff",
      borderColor:"#e2e6ef",textStyle:{color:"#1e293b",fontSize:11},
      extraCssText:"box-shadow:0 4px 12px rgba(0,0,0,.1);border-radius:6px;",
      formatter:"{b}: {d}%"},
    color:PIE_CLR,
    series:[{
      type:"pie",radius:["26%","62%"],center:["50%","50%"],
      label:{show:true,color:"#475569",fontSize:10,
        formatter:function(p){
          if(p.value<=0)return"";
          return p.name+" "+p.value+"%";
        },
        lineHeight:13},
      labelLine:{length:8,length2:10,lineStyle:{color:"#cbd5e1",width:1}},
      itemStyle:{borderColor:"#fff",borderWidth:2},
      emphasis:{scale:true,scaleSize:3,
        label:{fontSize:12,fontWeight:600,color:"#1e293b"}},
      data,
    }],
  };
}

// ====================================================
// 缩放工具条
// ====================================================
function initZoomBar(){
  const slider=document.getElementById("zoomSlider");
  const pctLabel=document.getElementById("zoomPct");
  const btnIn=document.getElementById("zoomIn");
  const btnOut=document.getElementById("zoomOut");

  function applyZoom(v){
    const zoom=Math.min(Math.max(v,80),600);
    slider.value=zoom;
    pctLabel.textContent=zoom+"%";
    // 更新slider轨道填充色
    const pct=((zoom-80)/(600-80)*100).toFixed(1);
    slider.style.background=`linear-gradient(to bottom,#94a3b8 ${pct}%,#e2e6ef ${pct}%)`;
    if(mapInst){
      mapInst.setOption({geo:{zoom:zoom/100}});
    }
  }

  slider.addEventListener("input",()=>applyZoom(Number(slider.value)));
  btnIn.addEventListener("click",()=>applyZoom(Number(slider.value)+20));
  btnOut.addEventListener("click",()=>applyZoom(Number(slider.value)-20));

  // 监听地图自身缩放（鼠标滚轮/触摸板），同步回工具条
  // ECharts 没有直接的 zoom 事件，用 georoam 事件
  mapInst.on("georoam",()=>{
    try{
      const opt=mapInst.getOption();
      const z=opt.geo&&opt.geo[0]&&opt.geo[0].zoom;
      if(z){
        const zPct=Math.round(z*100);
        slider.value=zPct;
        pctLabel.textContent=zPct+"%";
        const pct=((zPct-80)/(600-80)*100).toFixed(1);
        slider.style.background=`linear-gradient(to bottom,#94a3b8 ${pct}%,#e2e6ef ${pct}%)`;
      }
    }catch(e){}
  });

  // 初始化填充色
  applyZoom(115);
}
